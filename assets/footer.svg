<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" fill="none">
  <defs>
    <linearGradient id="fade-out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <style>
    @media (prefers-color-scheme: light) {
