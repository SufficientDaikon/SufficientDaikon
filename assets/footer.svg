  <text class="footer-text" text-anchor="middle" x="450" y="50" fill="#4b5563" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" opacity="0.7">
