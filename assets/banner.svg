<svg width="860" height="160" viewBox="0 0 860 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path = shape of name text (lets us paint inside letters) -->
    <clipPath id="name-clip">
      <text x="24" y="96"
        font-family="'SFMono-Regular','Consolas','Liberation Mono','Menlo',monospace"
        font-size="60" font-weight="700" letter-spacing="8">AHMED TAHA</text>
    </clipPath>

    <!-- Base fill: dark-cyan to cyan gradient across full width -->
    <linearGradient id="name-base" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0"   stop-color="#007A8F"/>
      <stop offset="0.5" stop-color="#00DBE9"/>
      <stop offset="1"   stop-color="#007A8F"/>
    </linearGradient>

    <!-- Shimmer: narrow white beam in the center of a wide rect -->
    <linearGradient id="sweep" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.58" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Cursor bar glow -->
    <filter id="cursor-glow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#00F0FF" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="160" fill="#0D1117"/>

  <!-- Grid overlay -->
  <rect width="860" height="160" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect width="3" height="160" fill="#00F0FF" opacity="0.9"/>

  <!-- Scan line sweeping top to bottom -->
  <rect x="0" y="0" width="860" height="1.5" fill="#00F0FF" opacity="0.18">
    <animate attributeName="y" values="-2;162" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- Name text: base gradient layer (clipped to letter shapes) -->
  <g clip-path="url(#name-clip)">
    <rect x="0" y="36" width="860" height="80" fill="url(#name-base)"/>
  </g>

  <!-- Name text: shimmer sweep layer (clipped to letter shapes) -->
  <g clip-path="url(#name-clip)">
    <rect y="36" height="80" width="400" fill="url(#sweep)">
      <animate attributeName="x" from="-400" to="1060" dur="3s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
  </g>

  <!-- Name text: glow halo (draw the text itself, invisible, just for the glow filter) -->
  <text x="24" y="96"
    font-family="'SFMono-Regular','Consolas','Liberation Mono','Menlo',monospace"
    font-size="60" font-weight="700" letter-spacing="8"
    fill="#00DBE9" opacity="0.35" filter="url(#glow)">AHMED TAHA</text>

  <!-- Subtitle -->
  <text x="27" y="130"
    font-family="'SFMono-Regular','Consolas','Liberation Mono','Menlo',monospace"
    font-size="13" letter-spacing="5" fill="#849495">BUILDING AI THAT BUILDS SOFTWARE</text>

  <!-- Blinking block cursor after subtitle -->
  <rect x="441" y="118" width="8" height="14" fill="#00F0FF" filter="url(#cursor-glow)">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Top-right forensic coordinates (literal Unicode, no HTML entities) -->
  <text x="848" y="22" text-anchor="end"
    font-family="'SFMono-Regular','Consolas',monospace"
    font-size="10" fill="#3B494B">CAIRO.EG &#xB7; 30.04&#xB0;N 31.24&#xB0;E</text>

  <text x="848" y="38" text-anchor="end"
    font-family="'SFMono-Regular','Consolas',monospace"
    font-size="10" fill="#3B494B">AI &#xB7; SYSTEMS &#xB7; OSS</text>

  <!-- Bottom accent line -->
  <rect x="0" y="157" width="860" height="1" fill="#00F0FF" opacity="0.25"/>

  <!-- Center dot -->
  <circle cx="430" cy="157" r="3" fill="#00F0FF" opacity="0.65"/>
</svg>
