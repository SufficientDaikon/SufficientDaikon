<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .txt { fill: #8b949e; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; }
      .txt { fill: #57606a; }
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
    .dot { animation: pulse 2s ease-in-out infinite; }
  </style>
  <rect class="bg" width="480" height="120" rx="6" fill="#0d1117"/>
  <text class="txt" x="240" y="55" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e">Generating metrics...</text>
  <g transform="translate(225, 75)">
    <circle class="dot" cx="0" cy="0" r="3" fill="#7c3aed" style="animation-delay:0s"/>
    <circle class="dot" cx="15" cy="0" r="3" fill="#7c3aed" style="animation-delay:0.3s"/>
    <circle class="dot" cx="30" cy="0" r="3" fill="#7c3aed" style="animation-delay:0.6s"/>
  </g>
</svg>
