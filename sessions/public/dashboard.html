<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      line-height: 1.5;
      min-height: 100vh;
    }
    .gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .gate-box { width: 100%; max-width: 360px; padding: 2.5rem; background: #1a1a1a; border: 1px solid #222; border-radius: 0.5rem; margin-inline: 1.5rem; }
    .gate-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: #a3a3a3; letter-spacing: 0.05em; text-transform: uppercase; }
    .gate-input { width: 100%; padding: 0.75rem 1rem; background: #0f0f0f; border: 1px solid #333; border-radius: 0.375rem; color: #f5f5f5; font-family: inherit; font-size: 0.95rem; margin-bottom: 1rem; }
    .gate-input:focus { outline: none; border-color: #3b82f6; }
    .gate-btn { width: 100%; padding: 0.75rem; background: #3b82f6; border: none; border-radius: 0.375rem; color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .gate-btn:hover { background: #2563eb; }
    .gate-error { color: #ef4444; font-size: 0.8rem; margin-top: 0.75rem; display: none; }
    .dashboard { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .dashboard.active { display: block; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .dash-title { font-size: 1.25rem; font-weight: 600; color: #f5f5f5; }
    .dash-subtitle { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .logout-btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid #333; border-radius: 0.375rem; color: #a3a3a3; font-size: 0.8rem; cursor: pointer; }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #1a1a1a; border: 1px solid #222; border-radius: 0.5rem; padding: 1.25rem; }
    .stat-label { font-size: 0.75rem; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: #f5f5f5; }
    .stat-card:first-child .stat-value { color: #3b82f6; }
    .table-wrap { background: #1a1a1a; border: 1px solid #222; border-radius: 0.5rem; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th { text-align: left; padding: 0.875rem 1rem; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; border-bottom: 1px solid #222; white-space: nowrap; }
    tbody td { padding: 0.875rem 1rem; border-bottom: 1px solid #1f1f1f; vertical-align: top; color: #d4d4d4; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 150ms; }
    tbody tr:hover { background: #1f1f1f; }
    .cell-empty { color: #444; }
    .cell-name { font-weight: 500; color: #f5f5f5; white-space: nowrap; }
    .cell-email { color: #a3a3a3; }
    .cell-date { color: #666; font-size: 0.8rem; white-space: nowrap; }
    .has-work-badge { display: inline-block; width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; margin-inline-start: 0.5rem; vertical-align: middle; }
    .avail-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .avail-chip { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.5rem; background: #262626; border: 1px solid #333; border-radius: 0.25rem; font-size: 0.75rem; color: #a3a3a3; white-space: nowrap; }
    .avail-day { direction: rtl; unicode-bidi: isolate; }
    .avail-time { direction: ltr; unicode-bidi: isolate; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
    .overlay.active { display: flex; }
    .overlay-card { width: 100%; max-width: 480px; background: #1a1a1a; border: 1px solid #222; border-radius: 0.5rem; padding: 2rem; margin: 1.5rem; max-height: 80vh; overflow-y: auto; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .overlay-name { font-size: 1.1rem; font-weight: 600; color: #f5f5f5; }
    .overlay-close { background: none; border: none; color: #666; font-size: 1.25rem; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
    .overlay-close:hover { color: #f5f5f5; background: #262626; }
    .overlay-section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 0.5rem; }
    .overlay-section { margin-bottom: 1.25rem; }
    .overlay-email { color: #a3a3a3; font-size: 0.9rem; }
    .overlay-work { color: #d4d4d4; font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; direction: auto; unicode-bidi: plaintext; }
    .overlay-work-empty { color: #444; font-size: 0.9rem; font-style: italic; }
    .loading { text-align: center; padding: 3rem; color: #666; }
    @media (max-width: 768px) {
      .dashboard { padding: 1rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .dash-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-box">
      <div class="gate-title">Dashboard</div>
      <form id="gateForm">
        <input type="password" class="gate-input" id="gatePassword" placeholder="Password" autocomplete="off" autofocus>
        <button type="submit" class="gate-btn">Enter</button>
        <div class="gate-error" id="gateError">Wrong password</div>
      </form>
    </div>
  </div>
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div>
        <div class="dash-title">Session Signups</div>
        <div class="dash-subtitle" id="lastUpdated"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">&mdash;</div></div>
      <div class="stat-card"><div class="stat-label">With Name</div><div class="stat-value" id="statName">&mdash;</div></div>
      <div class="stat-card"><div class="stat-label">With Email</div><div class="stat-value" id="statEmail">&mdash;</div></div>
      <div class="stat-card"><div class="stat-label">With Availability</div><div class="stat-value" id="statAvail">&mdash;</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Availability</th><th>Date</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-header">
        <div class="overlay-name" id="overlayName"></div>
        <button class="overlay-close" id="overlayClose">&times;</button>
      </div>
      <div class="overlay-section">
        <div class="overlay-section-label">Email</div>
        <div id="overlayEmail"></div>
      </div>
      <div class="overlay-section">
        <div class="overlay-section-label">Availability</div>
        <div id="overlayAvail"></div>
      </div>
      <div class="overlay-section">
        <div class="overlay-section-label">Work / AI Experience</div>
        <div id="overlayWork"></div>
      </div>
    </div>
  </div>
  <script>
    var API = 'https://session-signup.ahmed-taha.workers.dev/api/sessions';
    var allData = [];
    function formatTimeShort(hour) {
      if (hour === 0) return '12 AM';
      if (hour < 12) return hour + ' AM';
      if (hour === 12) return '12 PM';
      return (hour - 12) + ' PM';
    }
    function parseAvailability(raw) {
      if (!raw || raw === '{}') return [];
      try {
        var obj = JSON.parse(raw);
        return Object.entries(obj).map(function(entry) {
          var day = entry[0], hours = entry[1];
          if (!Array.isArray(hours) || hours.length === 0) return null;
          var sorted = hours.slice().sort(function(a, b) { return a - b; });
          return { day: day, time: formatTimeShort(sorted[0]) + ' \u2013 ' + formatTimeShort(sorted[sorted.length - 1] + 1) };
        }).filter(Boolean);
      } catch (e) { return [{ day: '', time: raw }]; }
    }
    function renderAvailChips(parsed) {
      if (parsed.length === 0) return '<span class="cell-empty">\u2014</span>';
      return '<div class="avail-chips">' + parsed.map(function(p) {
        return '<span class="avail-chip">' +
          (p.day ? '<span class="avail-day">' + esc(p.day) + '</span>' : '') +
          '<span class="avail-time">' + esc(p.time) + '</span></span>';
      }).join('') + '</div>';
    }
    function formatDate(iso) {
      var d = new Date(iso);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var h = d.getHours(), m = d.getMinutes().toString().padStart(2, '0');
      var ampm = h >= 12 ? 'PM' : 'AM';
      var h12 = h % 12 || 12;
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' \u00b7 ' + h12 + ':' + m + ' ' + ampm;
    }
    function esc(s) { var el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
    function openOverlay(index) {
      var r = allData[index];
      if (!r) return;
      document.getElementById('overlayName').textContent = r.name && r.name.trim() ? r.name : '(no name)';
      document.getElementById('overlayEmail').innerHTML = r.email && r.email.trim()
        ? '<span class="overlay-email">' + esc(r.email) + '</span>'
        : '<span class="cell-empty">\u2014</span>';
      document.getElementById('overlayAvail').innerHTML = renderAvailChips(parseAvailability(r.availability));
      document.getElementById('overlayWork').innerHTML = r.workExperience && r.workExperience.trim()
        ? '<div class="overlay-work" dir="auto">' + esc(r.workExperience) + '</div>'
        : '<div class="overlay-work-empty">No work experience provided</div>';
      document.getElementById('overlay').classList.add('active');
    }
    document.getElementById('overlayClose').addEventListener('click', function() { document.getElementById('overlay').classList.remove('active'); });
    document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) document.getElementById('overlay').classList.remove('active'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') document.getElementById('overlay').classList.remove('active'); });
    var saved = sessionStorage.getItem('dash_token');
    if (saved) unlock(saved);
    document.getElementById('gateForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('gateError').style.display = 'none';
      await unlock(document.getElementById('gatePassword').value);
    });
    document.getElementById('logoutBtn').addEventListener('click', function() {
      sessionStorage.removeItem('dash_token');
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('gate').style.display = 'flex';
      document.getElementById('gatePassword').value = '';
    });
    async function unlock(password) {
      try {
        var res = await fetch(API, { headers: { 'Authorization': 'Bearer ' + password } });
        var json = await res.json();
        if (!json.success) {
          document.getElementById('gateError').style.display = 'block';
          sessionStorage.removeItem('dash_token');
          return;
        }
        sessionStorage.setItem('dash_token', password);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        renderData(json.data, json.total);
      } catch (err) {
        document.getElementById('gateError').textContent = 'Connection error';
        document.getElementById('gateError').style.display = 'block';
      }
    }
    function renderData(data, total) {
      allData = data;
      var withName = data.filter(function(r) { return r.name && r.name.trim(); }).length;
      var withEmail = data.filter(function(r) { return r.email && r.email.trim(); }).length;
      var withAvail = data.filter(function(r) { return r.availability && r.availability !== '{}'; }).length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statName').textContent = withName;
      document.getElementById('statEmail').textContent = withEmail;
      document.getElementById('statAvail').textContent = withAvail;
      document.getElementById('lastUpdated').textContent = 'Updated ' + formatDate(new Date().toISOString());
      var tbody = document.getElementById('tableBody');
      if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="loading">No signups yet</td></tr>'; return; }
      tbody.innerHTML = data.map(function(r, i) {
        var hasWork = r.workExperience && r.workExperience.trim();
        var name = r.name && r.name.trim()
          ? '<span class="cell-name">' + esc(r.name) + '</span>' + (hasWork ? '<span class="has-work-badge" title="Has work experience"></span>' : '')
          : '<span class="cell-empty">\u2014</span>';
        var email = r.email && r.email.trim()
          ? '<span class="cell-email">' + esc(r.email) + '</span>'
          : '<span class="cell-empty">\u2014</span>';
        var avail = renderAvailChips(parseAvailability(r.availability));
        var date = '<span class="cell-date">' + formatDate(r.createdAt) + '</span>';
        return '<tr onclick="openOverlay(' + i + ')"><td style="color:#444">' + (i + 1) + '</td><td>' + name + '</td><td>' + email + '</td><td>' + avail + '</td><td>' + date + '</td></tr>';
      }).join('');
    }
  </script>
</body>
</html>
