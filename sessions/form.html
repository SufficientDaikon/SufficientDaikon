<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>احجز جلستك</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-block: 2rem;
    }

    .container {
      width: 100%;
      max-width: 700px;
      padding-inline: 1.5rem;
    }

    .form-wrapper {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 0.5rem;
      padding-block: 2.5rem;
      padding-inline: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-block-end: 0.5rem;
      color: #f5f5f5;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #a3a3a3;
      margin-block-end: 2rem;
    }

    .form-group {
      margin-block-end: 1.75rem;
    }

    .optional-text {
      font-size: 0.8rem;
      color: #a3a3a3;
      font-weight: 400;
      margin-inline-start: 0.5rem;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      color: #e5e5e5;
      margin-block-end: 0.6rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding-block: 0.75rem;
      padding-inline: 1rem;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 0.375rem;
      color: #f5f5f5;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 200ms, box-shadow 200ms;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: inset 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 5rem;
      font-family: inherit;
    }

    .help-text {
      display: block;
      font-size: 0.8rem;
      color: #a3a3a3;
      margin-block-start: 0.4rem;
    }

    .error-text {
      display: block;
      font-size: 0.8rem;
      color: #ef4444;
      margin-block-start: 0.4rem;
    }

    .field-error input,
    .field-error textarea {
      border-color: #ef4444;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-block-end: 0;
      cursor: pointer;
      font-weight: 400;
      color: #a3a3a3;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      padding: 0;
      background: none;
      border: 1px solid #333;
      cursor: pointer;
      width: 1.2rem;
      height: 1.2rem;
      min-width: 1.2rem;
      accent-color: #3b82f6;
    }

    /* Availability Grid */
    .availability-grid-wrapper {
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 0.375rem;
      padding: 1.25rem;
    }

    .days-select {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.75rem;
      margin-block-end: 1.5rem;
    }

    .day-btn {
      padding: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0.375rem;
      color: #a3a3a3;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 150ms;
    }

    .day-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .day-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .hours-container {
      display: none;
      margin-block-start: 1rem;
    }

    .hours-container.active {
      display: block;
    }

    .day-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e5e5e5;
      margin-block-end: 0.75rem;
    }

    .hours-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.5rem;
    }

    .time-range-btn {
      padding: 0.6rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0.3rem;
      color: #a3a3a3;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 150ms;
      direction: ltr;
    }

    .time-range-btn:hover {
      border-color: #60a5fa;
      color: #60a5fa;
    }

    .time-range-btn.selected {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    button[type="submit"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button[type="submit"]:disabled:hover {
      background-color: #3b82f6;
    }

    .summary-text {
      font-size: 0.85rem;
      color: #a3a3a3;
      margin-block-start: 1rem;
      padding-block: 0.75rem;
      padding-inline: 0.75rem;
      background: #0f0f0f;
      border-inline-start: 2px solid #3b82f6;
      border-radius: 0.3rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.9rem;
      background: #3b82f6;
      border: none;
      border-radius: 0.375rem;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 150ms;
      margin-block-start: 1rem;
    }

    button[type="submit"]:hover {
      background: #2563eb;
    }

    button[type="submit"]:active {
      background: #1d4ed8;
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-block: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      display: block;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .form-wrapper {
        padding-block: 1.5rem;
        padding-inline: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .days-select {
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <h1>احجز جلستك</h1>
      <p class="subtitle">جلسة مجانية عشان نتكلم عن الـAI و الشغل</p>

      <form id="signupForm">
        <!-- Name Field -->
        <div class="form-group">
          <label for="name">name <span class="optional-text">(optional)</span></label>
          <input type="text" id="name" name="name" placeholder=" محمد">
          <span class="error-text" id="nameError"></span>
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label for="email">email <span class="optional-text">(optional)</span></label>
          <input type="text" id="email" name="email" placeholder="you@example.com">
          <span class="error-text" id="emailError"></span>
        </div>

        <!-- Availability Grid -->
        <div class="form-group">
          <label>الاوقات المناسبة ليك <span class="optional-text">(optional)</span></label>
          <div class="availability-grid-wrapper">
            <!-- Days -->
            <div class="days-select" id="daysSelect"></div>

            <!-- Hours per day -->
            <div id="hoursContainer"></div>

            <!-- Summary -->
            <div class="summary-text" id="availabilitySummary">لم تحدد أي أوقات متاحة بعد</div>
          </div>
          <span class="error-text" id="availabilityError"></span>
        </div>

        <!-- Work & AI Experience -->
        <div class="form-group">
          <label for="workExperience">كلمني شوية عن شغلك وقد ايه انت بتستعمل الai دلوقتي <span class="optional-text">(optional)</span></label>
          <textarea id="workExperience" name="workExperience" placeholder="اكتب هنا..."></textarea>
          <span class="error-text" id="workExperienceError"></span>
        </div>

        <!-- Consent Checkbox -->
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="consent" name="consent" required>
            <span>انت موافق المعلومات دي تتسجل علي الdatabase؟</span>
          </label>
          <span class="error-text" id="consentError"></span>
        </div>

        <button type="submit" id="submitBtn">submit</button>

        <!-- Success/Error Messages -->
        <div id="successMessage" class="message success" style="display: none;"></div>
        <div id="errorMessage" class="message error" style="display: none;"></div>
      </form>
    </div>
  </div>

  <script>
    const DAYS = ['الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت', 'الأحد'];
    const TIME_RANGES = [
      { start: 9, end: 11, label: '9 AM - 11 AM' },
      { start: 11, end: 13, label: '11 AM - 1 PM' },
      { start: 13, end: 15, label: '1 PM - 3 PM' },
      { start: 15, end: 17, label: '3 PM - 5 PM' },
      { start: 17, end: 19, label: '5 PM - 7 PM' },
      { start: 19, end: 21, label: '7 PM - 9 PM' },
      { start: 21, end: 23, label: '9 PM - 11 PM' },
    ];

    let selectedAvailability = {};

    function formatTimeIn12Hour(hour) {
      if (hour === 0) return '12 AM';
      if (hour < 12) return `${hour} AM`;
      if (hour === 12) return '12 PM';
      return `${hour - 12} PM`;
    }

    // Initialize form
    document.addEventListener('DOMContentLoaded', () => {
      initializeDaysSelect();
      initializeHoursContainers();
      setupFormListeners();
      updateSubmitButtonState();
    });

    function initializeDaysSelect() {
      const daysSelect = document.getElementById('daysSelect');
      DAYS.forEach((day, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'day-btn';
        btn.textContent = day;
        btn.dataset.day = index;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          toggleDay(btn, index);
        });
        daysSelect.appendChild(btn);
      });
    }

    function initializeHoursContainers() {
      const hoursContainer = document.getElementById('hoursContainer');
      DAYS.forEach((day, dayIndex) => {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'hours-container';
        dayDiv.id = `hours-day-${dayIndex}`;
        dayDiv.innerHTML = `
          <div class="day-label">${day}</div>
          <div class="hours-grid" id="hours-grid-${dayIndex}"></div>
        `;
        hoursContainer.appendChild(dayDiv);

        const hoursGrid = dayDiv.querySelector(`#hours-grid-${dayIndex}`);
        TIME_RANGES.forEach((range) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'time-range-btn';
          btn.dir = 'ltr';
          btn.textContent = range.label;
          btn.dataset.start = range.start;
          btn.dataset.end = range.end;
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            toggleTimeRange(btn, dayIndex, range);
          });
          hoursGrid.appendChild(btn);
        });
      });
    }

    function toggleDay(btn, dayIndex) {
      btn.classList.toggle('active');
      document.getElementById(`hours-day-${dayIndex}`).classList.toggle('active');

      if (!btn.classList.contains('active')) {
        selectedAvailability[dayIndex] = [];
        // Deselect all time ranges for this day
        document.querySelectorAll(`#hours-grid-${dayIndex} .time-range-btn`).forEach((h) => {
          h.classList.remove('selected');
        });
      }

      updateAvailabilitySummary();
    }

    function toggleTimeRange(btn, dayIndex, range) {
      btn.classList.toggle('selected');

      if (!selectedAvailability[dayIndex]) {
        selectedAvailability[dayIndex] = [];
      }

      if (btn.classList.contains('selected')) {
        // Add all hours in this range
        for (let hour = range.start; hour < range.end; hour++) {
          if (!selectedAvailability[dayIndex].includes(hour)) {
            selectedAvailability[dayIndex].push(hour);
          }
        }
      } else {
        // Remove all hours in this range
        selectedAvailability[dayIndex] = selectedAvailability[dayIndex].filter(
          (h) => h < range.start || h >= range.end
        );
      }

      // Sort hours
      selectedAvailability[dayIndex].sort((a, b) => a - b);

      updateAvailabilitySummary();
    }

    function updateAvailabilitySummary() {
      const summary = document.getElementById('availabilitySummary');
      const selected = Object.entries(selectedAvailability).filter(([_, hours]) => hours.length > 0);

      if (selected.length === 0) {
        summary.textContent = 'لم تحدد أي أوقات متاحة بعد';
        return;
      }

      const parts = selected.map(([dayIndex, hours]) => {
        const dayName = DAYS[dayIndex];
        const startHour = Math.min(...hours);
        const endHour = Math.max(...hours) + 1;
        const timeRange = `${formatTimeIn12Hour(startHour)} - ${formatTimeIn12Hour(endHour)}`;
        return `${dayName}: \u200E${timeRange}`;
      });

      summary.textContent = `الأوقات المتاحة: ${parts.join(' | ')}`;
    }

    function updateSubmitButtonState() {
      const consentCheckbox = document.getElementById('consent');
      const submitBtn = document.getElementById('submitBtn');

      const isChecked = consentCheckbox.checked;
      submitBtn.disabled = !isChecked;
    }

    function setupFormListeners() {
      const form = document.getElementById('signupForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await submitForm();
      });

      // Checkbox listener
      document.getElementById('consent').addEventListener('change', updateSubmitButtonState);

      // Real-time validation on blur
      document.getElementById('name').addEventListener('blur', validateName);
      document.getElementById('email').addEventListener('blur', validateEmail);
      document.getElementById('workExperience').addEventListener('blur', validateWorkExperience);
    }

    function validateName() {
      const nameInput = document.getElementById('name');
      const nameError = document.getElementById('nameError');
      const value = nameInput.value.trim();

      if (value.length > 0 && value.length < 2) {
        nameError.textContent = 'الاسم يجب أن يكون أطول من حرفين';
        return false;
      }
      nameError.textContent = '';
      return true;
    }

    function validateEmail() {
      return true;
    }

    function validateWorkExperience() {
      const workInput = document.getElementById('workExperience');
      const workError = document.getElementById('workExperienceError');
      const value = workInput.value.trim();

      if (value.length > 0 && value.length < 5) {
        workError.textContent = 'الرجاء كتابة وصف أطول قليلاً';
        return false;
      }
      workError.textContent = '';
      return true;
    }

    function validateAvailability() {
      // Availability is now optional
      const selected = Object.entries(selectedAvailability).filter(([_, hours]) => hours.length > 0);
      document.getElementById('availabilityError').textContent = '';
      return true;
    }

    function validateConsent() {
      const consentInput = document.getElementById('consent');
      const consentError = document.getElementById('consentError');

      if (!consentInput.checked) {
        consentError.textContent = 'يجب الموافقة على تسجيل البيانات';
        return false;
      }
      consentError.textContent = '';
      return true;
    }

    async function submitForm() {
      // Validate all fields
      const isNameValid = validateName();
      const isEmailValid = validateEmail();
      const isWorkValid = validateWorkExperience();
      const isAvailabilityValid = validateAvailability();
      const isConsentValid = validateConsent();

      if (!isNameValid || !isEmailValid || !isWorkValid || !isAvailabilityValid || !isConsentValid) {
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري الحفظ...';

      try {
        const formData = {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          availability: Object.entries(selectedAvailability)
            .filter(([_, hours]) => hours.length > 0)
            .reduce((acc, [dayIndex, hours]) => {
              acc[DAYS[dayIndex]] = hours;
              return acc;
            }, {}),
          workExperience: document.getElementById('workExperience').value.trim(),
        };

        const response = await fetch('https://session-signup.ahmed-taha.workers.dev/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });

        const result = await response.json();

        if (result.success) {
          document.getElementById('successMessage').textContent = `✓ تم حجزك بنجاح! رقم الجلسة: ${result.sessionId.slice(0, 8)}`;
          document.getElementById('successMessage').style.display = 'block';
          document.getElementById('errorMessage').textContent = '';
          document.getElementById('errorMessage').style.display = 'none';
          document.getElementById('signupForm').reset();
          selectedAvailability = {};
          document.querySelectorAll('.day-btn, .time-range-btn').forEach((btn) => btn.classList.remove('active', 'selected'));
          updateAvailabilitySummary();
          updateSubmitButtonState();
        } else {
          document.getElementById('errorMessage').textContent = `✗ ${result.error}`;
          document.getElementById('errorMessage').style.display = 'block';
          document.getElementById('successMessage').textContent = '';
          document.getElementById('successMessage').style.display = 'none';
        }
      } catch (error) {
        console.error('Submission error:', error);
        document.getElementById('errorMessage').textContent = '✗ حدث خطأ ما. حاول مرة أخرى.';
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('successMessage').textContent = '';
        document.getElementById('successMessage').style.display = 'none';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'submit';
        updateSubmitButtonState();
      }
    }
  </script>
</body>
</html>
