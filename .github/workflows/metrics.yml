name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── Isometric Contribution Calendar (full year) ──
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Africa/Cairo
          config_display: large
          config_output: svg

      # ── Coding Habits ──
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 60
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          config_timezone: Africa/Cairo
          config_output: svg

      # ── Languages (indepth analysis) ──
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_sections: most-used
          plugin_languages_recent_days: 60
          plugin_languages_limit: 12
          plugin_languages_colors: "7c3aed, a855f7, c084fc, 818cf8, 06b6d4, 22d3ee, 10b981, f59e0b, ef4444, 6366f1, ec4899, 8b5cf6"
          config_output: svg

      # ── Notable Contributions ──
      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          config_output: svg

      # ── Repository Stats ──
      - name: Repository Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/repositories.svg
          base: repositories
          config_output: svg

      # ── Follow-up of Issues and PRs ──
      - name: Follow-up
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/followup.svg
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          plugin_followup_sections: user
          config_output: svg
